<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<html>
<head>
    <style>
        table {
            border-collapse: collapse;
            width: 1000px;
            height: 500px;
        }
        td {
            border: 2px solid black;
        }
        .inner-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
        }
        .inner-table td {
            border: 2px solid black;
        }
    </style>
</head>
<body>

<table>
    <!-- Row 1 -->
    <tr>
        <td rowspan="2"></td>
        <td colspan="3"></td>
        <td></td>
        <td></td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td></td>
        <td rowspan="3"></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td></td>
        <td></td>
        <td></td>
        <td colspan="2"></td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td rowspan="2"></td>
        <td rowspan="2"></td>
        <td></td>

        <td rowspan="2" colspan="2">
            <table class="inner-table">
                <tr>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- Row 5 -->
    <tr>
        <td></td>
    </tr>
</table>

</body>
</html>
    
</body>
</html>
